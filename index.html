<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vía 51 - Nodo Político</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; margin: 0; font-family: ui-sans-serif, system-ui; }
        .glass-card { background: white; border-radius: 3.5rem; }
        .btn-secondary { background-color: #f3e8ff; color: #49187D; border: 1px solid #e9d5ff; }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { createClient } = supabase;
        const supabaseClient = createClient(
            "https://ibhhzgtxaqwdykedhtvk.supabase.co", 
            "sb_publishable_Aicdv3GPUOAdE04R9YVHpw_dA18Knik"
        );

        const App = () => {
            const [nombre, setNombre] = React.useState("");
            const [dni, setDni] = React.useState("");
            const [status, setStatus] = React.useState("");
            const [registrado, setRegistrado] = React.useState(false);
            const [order, setOrder] = React.useState("LO-SP");
            const [procedencia, setProcedencia] = React.useState("DIRECTO");

            React.useEffect(() => {
                // NOTA PRO: He apagado el 'localStorage' temporalmente 
                // para que el navegador deje de engañarte y te permita probar 100 veces si quieres.
                
                fetch('https://ipapi.co/json/')
                    .then(res => res.json())
                    .then(data => {
                        const sierraRegiones = ["Cusco", "Puno", "Ayacucho", "Huancavelica", "Apurimac", "Junin", "Pasco"];
                        const englishCountries = ["US", "GB", "CA", "AU", "NZ", "IE"];
                        if (data.country_code === "PE" && sierraRegiones.includes(data.region)) setOrder("LO-HA");
                        else if (englishCountries.includes(data.country_code)) setOrder("LO-EN");
                    }).catch(() => setOrder("LO-SP"));
            }, []);

            const content = {
                acuerdo: { ES: "SELLAR ACUERDO POLÍTICO", QU: "POLÍTICO ARARIYTA SELLAY", EN: "SEAL POLITICAL AGREEMENT" },
                lema: { ES: "Contigo recuperaremos la paz", QU: "Qanwan hawkalla kawsayta kutichisun", EN: "With you we will recover peace" }
            };

            const getLabels = () => {
                if (order === "LO-HA") return [content.acuerdo.QU, content.acuerdo.ES, content.acuerdo.EN];
                if (order === "LO-EN") return [content.acuerdo.EN, content.acuerdo.ES, content.acuerdo.QU];
                return [content.acuerdo.ES, content.acuerdo.QU, content.acuerdo.EN];
            };

            const handleNombreChange = (e) => {
                const val = e.target.value;
                if (/^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]*$/.test(val)) setNombre(val);
            };

            const handleDniChange = (e) => {
                const val = e.target.value;
                if (/^\d{0,8}$/.test(val)) setDni(val);
            };

            const registrarProcedencia = (origen) => {
                setProcedencia(origen);
                setStatus(`Interés en: ${origen}`);
                setTimeout(() => setStatus(""), 1500);
            };

            const handleRegistro = async () => {
                if (nombre.trim().length < 3 || dni.length !== 8) {
                    setStatus("⚠️ Verifique Nombre y DNI (8 dígitos).");
                    return;
                }
                
                setStatus("Conectando con Supabase...");
                
                try {
                    const { data, error, status: responseStatus } = await supabaseClient
                        .from('pol_registro_ciudadano')
                        .insert([{ 
                            nombre: nombre.toUpperCase().trim(), 
                            dni: dni.trim(), 
                            compromiso: `V2.9.4-${order}-FROM:${procedencia}` 
                        }])
                        .select(); 

                    if (error) {
                        setStatus(`❌ Error Supabase: ${error.message}`);
                        return;
                    }

                    if (responseStatus === 201 || (data && data.length > 0)) {
                        setRegistrado(true);
                    } else {
                        setStatus("⚠️ Guardado bloqueado por RLS en Supabase.");
                    }
                } catch (err) { 
                    setStatus("❌ Error de red."); 
                }
            };

            // Botón para resetear todo y hacer otra prueba rápida
            const resetearPrueba = () => {
                setNombre("");
                setDni("");
                setStatus("");
                setProcedencia("DIRECTO");
                setRegistrado(false);
            };

            if (registrado) return (
                <div className="min-h-screen flex items-center justify-center bg-[#49187D] p-6 text-center fade-in">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-sm w-full">
                        <div className="text-green-500 text-6xl mb-4 font-bold">✓</div>
                        <h2 className="text-[#49187D] font-black text-3xl uppercase italic leading-none">Acuerdo Sellado</h2>
                        <p className="text-gray-400 mt-6 text-[11px] font-bold uppercase tracking-widest">
                            {order === "LO-EN" ? content.lema.EN : order === "LO-HA" ? content.lema.QU : content.lema.ES}
                        </p>
                        <button onClick={resetearPrueba} className="mt-8 text-[10px] text-gray-400 font-bold uppercase underline">
                            Registrar a otra persona
                        </button>
                    </div>
                </div>
            );

            const labels = getLabels();

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="max-w-md w-full glass-card overflow-hidden border border-gray-100 shadow-2xl">
                        <div className="bg-[#49187D] p-6 text-center">
                            <h1 className="text-white text-[10px] font-black uppercase tracking-[0.2em]">Nodo Político Vía 51</h1>
                        </div>
                        <div className="p-10">
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                {['Presidente', 'Senadores', 'Diputados', 'P. Andino'].map(btn => (
                                    <button key={btn} onClick={() => registrarProcedencia(btn)} className="text-[8px] bg-[#49187D] text-white py-3.5 rounded-xl font-black uppercase shadow-md active:scale-95 transition-all">{btn}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-2 mb-8">
                                <button onClick={() => registrarProcedencia('Partido Morado')} className="text-[8px] btn-secondary py-3 rounded-xl font-black uppercase shadow-sm active:scale-95 transition-all">Partido Morado</button>
                                <button onClick={() => registrarProcedencia('Garantías')} className="text-[8px] btn-secondary py-3 rounded-xl font-black uppercase shadow-sm active:scale-95 transition-all">Garantías</button>
                            </div>
                            <div className="bg-purple-50 p-6 rounded-[2rem] mb-6 text-center border border-purple-100">
                                <p className="text-[12px] text-[#49187D] font-black uppercase italic leading-tight">({order === "LO-EN" ? content.lema.EN : order === "LO-HA" ? content.lema.QU : content.lema.ES})</p>
                            </div>
                            <div className="space-y-4">
                                <input type="text" placeholder="Nombres y Apellidos" className="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 text-sm font-bold outline-none text-black" value={nombre} onChange={handleNombreChange} />
                                <input type="text" placeholder="D.N.I. (8 dígitos)" className="w-full p-4 rounded-xl bg-gray-50 border border-gray-100 text-sm font-bold outline-none text-black" value={dni} onChange={handleDniChange} />
                                <button onClick={handleRegistro} className="w-full bg-[#49187D] text-white font-black py-6 rounded-[2.5rem] shadow-xl uppercase text-center active:bg-black transition-all">
                                    <div className="text-[11px] mb-1">{labels[0]}</div>
                                    <div className="text-[9px] text-purple-200 opacity-90">{labels[1]}</div>
                                    <div className="text-[9px] text-purple-300 opacity-80 italic">{labels[2]}</div>
                                </button>
                                {status && <p className="text-center text-[10px] font-bold text-purple-600 mt-2 italic">{status}</p>}
                            </div>
                        </div>
                        <div className="bg-gray-50 p-6 text-center border-t border-gray-100">
                            <p className="text-[9px] text-gray-300 font-black tracking-[0.4em] uppercase">Protocolo Vía51- Versión 2.9.4</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

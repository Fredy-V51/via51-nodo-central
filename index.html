<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vía 51 - Nodo Político</title>
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; margin: 0; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 3.5rem; }
        .btn-secondary { background-color: #f3e8ff; color: #49187D; border: 1px solid #e9d5ff; }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        .toast-slide { animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translate(-50%, -150%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { createClient } = supabase;
    const supabaseClient = createClient(
        "https://ibhhzgtxaqwdykedhtvk.supabase.co", 
        "sb_publishable_Aicdv3GPUOAdE04R9YVHpw_dA18Knik"
    );

    const App = () => {
        const [nombre, setNombre] = React.useState("");
        const [dni, setDni] = React.useState("");
        const [telefono, setTelefono] = React.useState("");
        const [status, setStatus] = React.useState("");
        const [registrado, setRegistrado] = React.useState(() => !!localStorage.getItem('via51_firmado'));
        const [procedencia, setProcedencia] = React.useState("DIRECTO");

        const handleRegistro = async () => {
            const dL = dni.trim();
            const nL = nombre.trim();
            if (dL.length !== 8) return setStatus("⚠️ DNI debe tener 8 números.");
            if (nL.length < 2) return setStatus("⚠️ Ingrese nombre completo.");

            // Filtro de Padrón solicitado
            if (dL.startsWith("9999")) return setStatus("⚠️ DNI INHABILITADO.");
            if (!dL.startsWith("8888")) return setStatus("⚠️ DNI NO FIGURA EN PADRÓN.");

            setStatus("Procesando acuerdo...");
            try {
                const { data: existe } = await supabaseClient.from('pol_registro_ciudadano').select('dni').eq('dni', dL).maybeSingle();
                if (existe) return setStatus("⚠️ Ya registrado.");

                const { error } = await supabaseClient.from('pol_registro_ciudadano').insert([{ 
                    nombre: nL.toUpperCase(), dni: dL, telefono: telefono.trim(),
                    compromiso: `V2.9.21-FROM:${procedencia}` 
                }]);

                if (!error) {
                    localStorage.setItem('via51_firmado', 'true');
                    setRegistrado(true);
                }
            } catch (e) { setStatus("❌ Error de conexión."); }
        };

        if (registrado) {
            const waMsg = encodeURIComponent(`Hola Vía 51 | Mesías Guevara, soy ${nombre.toUpperCase()}, DNI ${dni}. ¡Acuerdo Sellado!`);
            return (
                <div className="min-h-screen flex items-center justify-center bg-[#49187D] p-6 text-center">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full">
                        <div className="text-green-500 text-6xl mb-4">✓</div>
                        <h2 className="text-[#49187D] font-black text-2xl uppercase italic">Acuerdo Sellado</h2>
                        <a href={`https://api.whatsapp.com/send?phone=51921654233&text=${waMsg}`} target="_blank" className="mt-8 block w-full bg-[#25D366] text-white font-black py-4 rounded-2xl uppercase text-[11px]">📱 Confirmar WhatsApp</a>
                        <button onClick={() => {localStorage.removeItem('via51_firmado'); setRegistrado(false);}} className="mt-8 text-[9px] text-gray-400 font-bold uppercase underline">Nuevo Registro</button>
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4">
                <div className="max-w-md w-full bg-white rounded-[3.5rem] overflow-hidden shadow-2xl border border-gray-100">
                    <div className="bg-[#49187D] p-8 text-center text-white">
                        <h1 className="text-[12px] font-black uppercase tracking-[0.3em]">Nodo Político Vía 51</h1>
                        <p className="text-[9px] opacity-70 mt-1 uppercase">Mesías Guevara Liderazgo</p>
                    </div>
                    
                    <div className="p-8 space-y-4">
                        {/* FILAS DE BOTONES RESTAURADAS */}
                        <div className="grid grid-cols-2 gap-2">
                            {['Presidente', 'Senadores'].map(btn => (
                                <button key={btn} onClick={() => setProcedencia(btn)} className={`text-[8px] py-3 rounded-xl font-black uppercase ${procedencia === btn ? 'bg-[#49187D] text-white' : 'bg-purple-50 text-purple-900'}`}>{btn}</button>
                            ))}
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                            {['Diputados', 'P. Andino'].map(btn => (
                                <button key={btn} onClick={() => setProcedencia(btn)} className={`text-[8px] py-3 rounded-xl font-black uppercase ${procedencia === btn ? 'bg-[#49187D] text-white' : 'bg-purple-50 text-purple-900'}`}>{btn}</button>
                            ))}
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                            {['Garantías', 'Partido Morado'].map(btn => (
                                <button key={btn} onClick={() => setProcedencia(btn)} className={`text-[8px] py-3 rounded-xl font-black uppercase ${procedencia === btn ? 'bg-[#49187D] text-white' : 'bg-purple-50 text-purple-900'}`}>{btn}</button>
                            ))}
                        </div>

                        <div className="pt-4 space-y-3">
                            <input type="text" placeholder="Nombres y Apellidos" className="w-full p-4 rounded-xl bg-gray-50 border text-sm font-bold outline-none" value={nombre} onChange={(e) => setNombre(e.target.value)} />
                            <input type="text" maxLength="8" placeholder="D.N.I. (8 dígitos)" className="w-full p-4 rounded-xl bg-gray-50 border text-sm font-bold outline-none" value={dni} onChange={(e) => setDni(e.target.value.replace(/\D/g,''))} />
                            <input type="text" maxLength="9" placeholder="WhatsApp" className="w-full p-4 rounded-xl bg-gray-50 border text-sm font-bold outline-none" value={telefono} onChange={(e) => setTelefono(e.target.value.replace(/\D/g,''))} />
                            
                            <button onClick={handleRegistro} className="w-full bg-[#49187D] text-white font-black py-6 rounded-[2.5rem] shadow-xl uppercase mt-4 active:scale-95 transition-transform">
                                <div className="text-[11px]">Sellar Acuerdo Político</div>
                                <div className="text-[8px] text-purple-300 opacity-80 italic">Vía 51 | Mesías Guevara</div>
                            </button>
                            {status && <p className="text-center text-[10px] font-bold text-red-500 mt-2">{status}</p>}
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
